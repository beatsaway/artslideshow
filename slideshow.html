<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image slideshow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      color: #ccc;
      font-family: system-ui, sans-serif;
    }
    .hint {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 0.4rem 1rem 0.5rem;
      background: rgba(0,0,0,0.75);
      font-size: 0.85rem;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.6rem 1rem;
    }
    .hint kbd { background: #333; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .duration-row {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem 0.6rem;
      font-size: 0.8rem;
    }
    .duration-row input[type="range"] {
      width: 100px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: #444;
      border-radius: 2px;
      vertical-align: middle;
    }
    .duration-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .duration-row input[type="range"]::-moz-range-track {
      height: 3px;
      background: #444;
      border-radius: 2px;
    }
    .duration-row input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border: none;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .duration-value {
      min-width: 2.2rem;
      font-variant-numeric: tabular-nums;
    }
    .gallery {
      padding-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .gallery figure {
      margin: 0;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
    }
    .gallery img {
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      vertical-align: middle;
    }
    .slideshow {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
      background: #000;
      align-items: center;
      justify-content: center;
    }
    .slideshow.is-on {
      display: flex;
    }
    .slideshow img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .slideshow .counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    body.slideshow-active {
      overflow: hidden;
    }
    body.slideshow-active .hint {
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="hint">
    <span><kbd>Space</kbd> — start / stop (loops)</span>
    <label class="duration-row" for="duration">
      <span>Duration</span>
      <input
        type="range"
        id="duration"
        min="1"
        max="5"
        step="0.1"
        value="3.5"
        aria-label="Seconds per image"
      />
      <span class="duration-value" id="durationValue" aria-hidden="true">3.5s</span>
    </label>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="slideshow" id="slideshow" aria-hidden="true">
    <img id="slideImg" src="" alt="" />
    <span class="counter" id="counter"></span>
  </div>
  <script>
    (function () {
      var FIRST = 1;
      /* Highest N in pasted_imagesN.jpg in this folder (update if you add files). */
      var LAST = 123;
      var gallery = document.getElementById("gallery");
      var durationEl = document.getElementById("duration");
      var durationValue = document.getElementById("durationValue");
      var slideshow = document.getElementById("slideshow");
      var slideImg = document.getElementById("slideImg");
      var counter = document.getElementById("counter");

      var paths = [];
      for (var n = FIRST; n <= LAST; n++) {
        paths.push("pasted_images" + n + ".jpg");
      }

      paths.forEach(function (src, i) {
        var fig = document.createElement("figure");
        var img = document.createElement("img");
        img.src = src;
        img.loading = i < 3 ? "eager" : "lazy";
        img.alt = "Image " + (i + 1);
        fig.appendChild(img);
        gallery.appendChild(fig);
      });

      var index = 0;
      var running = false;
      var timer = null;

      function showSlide() {
        slideImg.src = paths[index];
        slideImg.alt = "Slide " + (index + 1) + " of " + paths.length;
        counter.textContent = index + 1 + " / " + paths.length;
      }

      function getIntervalMs() {
        return Math.round(parseFloat(durationEl.value) * 1000);
      }

      function formatDuration() {
        var s = parseFloat(durationEl.value);
        var t = s % 1 === 0 ? s.toFixed(0) : s.toFixed(1);
        return t + "s";
      }

      function syncDurationLabel() {
        durationValue.textContent = formatDuration();
      }

      function tick() {
        index = (index + 1) % paths.length;
        showSlide();
      }

      function applyInterval() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        if (running) {
          timer = setInterval(tick, getIntervalMs());
        }
      }

      function start() {
        if (running) return;
        running = true;
        document.body.classList.add("slideshow-active");
        slideshow.classList.add("is-on");
        slideshow.setAttribute("aria-hidden", "false");
        showSlide();
        applyInterval();
      }

      function stop() {
        if (!running) return;
        running = false;
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        document.body.classList.remove("slideshow-active");
        slideshow.classList.remove("is-on");
        slideshow.setAttribute("aria-hidden", "true");
      }

      function toggle() {
        if (running) stop();
        else start();
      }

      durationEl.addEventListener("input", function () {
        syncDurationLabel();
        applyInterval();
      });
      syncDurationLabel();

      document.addEventListener("keydown", function (e) {
        if (e.code !== "Space" && e.key !== " ") return;
        e.preventDefault();
        toggle();
      });
    })();
  </script>
</body>
</html>
