<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minimalism 01 — slideshow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #fff;
      color: #333;
      font-family: system-ui, sans-serif;
    }
    .panel {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.55);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.15s ease, visibility 0.15s;
    }
    .panel.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .panel-inner {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      max-width: min(90vw, 28rem);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      font-size: 0.85rem;
      color: #eee;
    }
    .panel-inner kbd { background: #333; padding: 0.1rem 0.35rem; border-radius: 3px; }
    .duration-row {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem 0.6rem;
      font-size: 0.8rem;
    }
    .duration-row input[type="range"] {
      width: 100px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: #444;
      border-radius: 2px;
      vertical-align: middle;
    }
    .duration-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .duration-row input[type="range"]::-moz-range-track {
      height: 3px;
      background: #444;
      border-radius: 2px;
    }
    .duration-row input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border: none;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
    }
    .duration-value {
      min-width: 2.2rem;
      font-variant-numeric: tabular-nums;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .gallery figure {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-sizing: border-box;
    }
    .gallery img,
    .slideshow img {
      width: 90vw;
      height: 90vh;
      object-fit: contain;
      object-position: center;
    }
    .slideshow {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
      background: #fff;
      box-sizing: border-box;
    }
    .slideshow.is-on {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slideshow .counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    body.slideshow-active {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel" aria-hidden="true">
    <div class="panel-inner">
      <p style="margin:0 0 0.6rem"><kbd>Space</kbd> — start / stop (loops)</p>
      <p style="margin:0 0 0.75rem;opacity:0.9"><kbd>M</kbd> — show / hide this panel</p>
      <p style="margin:0 0 0.75rem;opacity:0.9"><kbd>,</kbd> / <kbd>.</kbd> — previous / next image</p>
      <label class="duration-row" for="duration">
        <span>Duration</span>
        <input
          type="range"
          id="duration"
          min="1"
          max="5"
          step="0.1"
          value="3.5"
          aria-label="Seconds per image"
        />
        <span class="duration-value" id="durationValue" aria-hidden="true">3.5s</span>
      </label>
    </div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="slideshow" id="slideshow" aria-hidden="true">
    <img id="slideImg" src="" alt="" />
    <span class="counter" id="counter"></span>
  </div>

        slideImg.alt = "Slide " + (index + 1) + " of " + paths.length;

      }

        index = (index + 1) % paths.length;

        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        if (running) {
          timer = setInterval(tick, getIntervalMs());
        }
      }

        slideshow.classList.add("is-on");

      function stop() {
        if (!running) return;
        running = false;
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        document.body.classList.remove("slideshow-active");
        slideshow.classList.remove("is-on");

        var fig = gallery.children[index];
        if (fig) {

      }

        if (running) stop();
        else start();
      }

      function goDelta(delta) {
        index = (index + delta + paths.length) % paths.length;
        if (running) {
          showSlide();
          applyInterval();
        } else {
          var fig = gallery.children[index];
          if (fig) {
            fig.scrollIntoView({ block: "center", behavior: "auto" });
          }

        if (running) return;
        var centerY = window.innerHeight / 2;
        var best = index;
        var bestDistance = Infinity;
        for (var i = 0; i < gallery.children.length; i++) {
          var rect = gallery.children[i].getBoundingClientRect();
          var figCenter = rect.top + rect.height / 2;
          var distance = Math.abs(figCenter - centerY);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = i;
          }
        }
        index = best;
      }

      function scheduleSyncIndexFromScroll() {
        if (running || rafSync) return;
        rafSync = requestAnimationFrame(function () {
          rafSync = 0;
          syncIndexFromScroll();
        });
      }

        var on = panel.classList.toggle("is-open");
        panel.setAttribute("aria-hidden", on ? "false" : "true");
      }

        syncDurationLabel();
        applyInterval();
      });

      window.addEventListener("scroll", scheduleSyncIndexFromScroll, { passive: true });
      window.addEventListener("resize", scheduleSyncIndexFromScroll);
      syncIndexFromScroll();

      document.addEventListener("keydown", function (e) {
        if (e.code === "KeyM" || e.key === "m" || e.key === "M") {
          e.preventDefault();
          togglePanel();
          return;
        }
        if (e.code === "Comma" || e.key === ",") {
          e.preventDefault();
          goDelta(-1);
          return;
        }
        if (e.code === "Period" || e.key === ".") {
          e.preventDefault();
          goDelta(1);
          return;
        }
        if (e.code !== "Space" && e.key !== " ") return;
        e.preventDefault();
        toggle();
      });
